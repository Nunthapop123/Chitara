{% extends 'song_gen/base.html' %}
{% load static %}

{% block public_content %}
<div class="login-wrapper">
    <div class="card login-card" style="padding: 3rem 2rem;">
        <div class="brand" style="justify-content: center; margin-bottom: 1rem; font-size: 2rem;">
            <i class="fas fa-guitar"></i> Chitara
        </div>
        
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p class="text-muted" style="margin-bottom: 2rem;">Sign in to continue making amazing AI music.</p>
        
        <form action="" method="POST" style="text-align: left; margin-bottom: 1.5rem;">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label class="form-label" style="display: flex; justify-content: space-between;">
                    Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 1.05rem; padding: 12px;">
                Login
            </button>
        </form>

        <div style="display: flex; align-items: center; margin-bottom: 1.5rem;">
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
            <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">OR</span>
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
        </div>
        
        <!-- OAuth Integration -->
        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" class="btn btn-outline" style="width: 100%; justify-content: center; font-size: 1.05rem; padding: 12px; margin-bottom: 0.5rem; border: 2px solid var(--border-color);">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px;">
            Sign in with Google
        </a>
        
        <p class="text-muted" style="margin-top: 2rem; font-size: 0.9rem; margin-bottom: 0;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
