{% extends 'song_gen/base.html' %}
{% load static %}

{% block public_content %}
<div class="login-wrapper">
    <div class="card login-card" style="padding: 3rem 2rem;">
        <div class="brand" style="justify-content: center; margin-bottom: 1rem; font-size: 2rem;">
            <i class="fas fa-guitar"></i> Chitara
        </div>
        
        <h2 style="margin-bottom: 0.5rem;">Create Account</h2>
        <p class="text-muted" style="margin-bottom: 2rem;">Join Chitara and get 20 daily generation credits.</p>
        
        <form action="" method="POST" style="text-align: left; margin-bottom: 1.5rem;">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; font-size: 1.05rem;">
                Sign Up
            </button>
        </form>

        <div style="display: flex; align-items: center; margin-bottom: 1.5rem;">
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
            <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">OR</span>
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
        </div>

        <!-- OAuth Placeholder -->
        <a href="#" onclick="alert('OAuth will be connected in the next step!'); return false;" class="btn btn-outline" style="width: 100%; justify-content: center; font-size: 1.05rem; padding: 12px; margin-bottom: 0.5rem; border: 2px solid var(--border-color);">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px;">
            Sign up with Google
        </a>
        
        <p class="text-muted" style="margin-top: 2rem; font-size: 0.9rem; margin-bottom: 0;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login</a>
        </p>
    </div>
</div>
{% endblock %}
